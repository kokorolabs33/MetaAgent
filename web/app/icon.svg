<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background: rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Hub node: center circle -->
  <circle cx="32" cy="32" r="8" fill="white" opacity="0.95"/>

  <!-- Orbiting agent nodes -->
  <circle cx="16" cy="16" r="5" fill="white" opacity="0.7"/>
  <circle cx="48" cy="16" r="5" fill="white" opacity="0.7"/>
  <circle cx="16" cy="48" r="5" fill="white" opacity="0.7"/>
  <circle cx="48" cy="48" r="5" fill="white" opacity="0.7"/>

  <!-- Connection lines from agents to hub -->
  <line x1="20" y1="19.5" x2="26" y2="28" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="44" y1="19.5" x2="38" y2="28" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="20" y1="44.5" x2="26" y2="36" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="44" y1="44.5" x2="38" y2="36" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>

  <!-- Small pulse ring on center -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="white" stroke-width="1.2" opacity="0.25"/>
</svg>
