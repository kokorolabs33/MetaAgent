# docker-compose.yml — One-click TaskHub startup
# Usage: ANTHROPIC_API_KEY=sk-... docker compose up
# Optional: OPENAI_API_KEY=sk-... enables demo agents (uncomment agent services below)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskhub
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub  # pragma: allowlist secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhub -d taskhub"]
      interval: 2s
      timeout: 5s
      retries: 10

  platform:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://taskhub:taskhub@postgres:5432/taskhub?sslmode=disable  # pragma: allowlist secret
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: "8080"
      FRONTEND_URL: http://localhost:3000
      TASKHUB_MODE: local
    depends_on:
      postgres:
        condition: service_healthy

